# ------------------------------------------------------------------
# Site Configuration
# ------------------------------------------------------------------

lang: tr
timezone: Europe/Istanbul

title: CyEn07
tagline: "Siber Güvenlik & İHA/SİHA Sistemleri"
description: >-
  Siber güvenlik, sızma testi ve İHA/SİHA (insansız hava aracı) sistemleri
  üzerine teknik notlar ve araştırma yazıları.

# Set this to your GitHub Pages URL, e.g. "https://07enesavci.github.io"
# (no trailing slash)
url: "https://07enesavci.github.io"
baseurl: ""

# Terminal prompt shown in the homepage hero, e.g. root@CyEn07:~#
prompt_user: "CyEn07"

author:
  name: "Muhammet Enes Avcı"
  nick: "CyEn07"
  email: "" # kendi e-posta adresini ekle

social:
  github: "07enesavci" # https://github.com/07enesavci
  x: "" # kullanici_adi -> https://x.com/kullanici_adi
  linkedin: "" # kullanici_adi -> https://linkedin.com/in/kullanici_adi
  email: "" # contact@example.com

nav:
  - title: Yazılar
    url: /posts/
  - title: Etiketler
    url: /tags/
  - title: Arşiv
    url: /archives/
  - title: Hakkında
    url: /about/

# Number of posts shown on the homepage "Son Yazılar" list
home_posts_limit: 5

plugins:
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-sitemap

feed:
  path: rss.xml

markdown: kramdown
highlighter: rouge
kramdown:
  input: GFM
  syntax_highlighter: rouge
  syntax_highlighter_opts:
    css_class: highlight
    span:
      line_numbers: false
    block:
      line_numbers: true
      start_line: 1

defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: post
      permalink: /posts/:title/

exclude:
  - Gemfile
  - Gemfile.lock
  - "*.gemspec"
  - tools
  - README.md
  - LICENSE
  - .devcontainer
  - .github
  - .vscode
  - node_modules
