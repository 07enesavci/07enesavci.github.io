<!doctype html>
<html lang="{{ site.lang | default: 'tr' }}">
<head>
{% include head.html %}
</head>
<body class="{% if page.layout == 'home' %}is-terminal{% endif %}">
<a id="skip-to-content" href="#main-content" class="skip-link">İçeriğe geç</a>

{% unless page.layout == 'home' %}{% include header.html %}{% endunless %}

<main id="main-content" class="{% if page.layout == 'home' %}terminal-main{% else %}wrap{% endif %}">
{{ content }}
</main>

{% unless page.layout == 'home' %}{% include footer.html %}{% endunless %}

<script src="{{ '/assets/js/app.js' | relative_url }}" defer></script>
{% if page.layout == 'home' %}<script src="{{ '/assets/js/terminal.js' | relative_url }}" defer></script>{% endif %}
</body>
</html>
