---
layout: default
---
<div id="terminal" class="terminal terminal-full" data-user="visitor" data-host="{{ site.prompt_user | default: site.title | downcase }}" tabindex="0">
  <div class="term-bar" aria-hidden="true">
    <span class="term-dot term-dot-red"></span>
    <span class="term-dot term-dot-yellow"></span>
    <span class="term-dot term-dot-green"></span>
    <span class="term-bar-title">{{ site.prompt_user | default: site.title | downcase }}@web ~ bash</span>
    <span class="term-bar-links">
      <a href="{{ '/posts/' | relative_url }}" title="Yazılar (klasik görünüm)">yazılar</a>
      <a href="{{ '/about/' | relative_url }}" title="Hakkında">hakkında</a>
    </span>
  </div>
  <div id="term-output" class="term-output" aria-live="polite"></div>
  <form id="term-form" class="term-input-line" autocomplete="off">
    <label for="term-input" id="term-prompt" class="term-prompt"></label>
    <input id="term-input" class="term-input" type="text" autocomplete="off" autocapitalize="off" autocorrect="off" spellcheck="false" aria-label="Terminal komut girişi" />
  </form>
</div>

<script id="fs-data" type="application/json">
{
  "site": {
    "title": {{ site.title | jsonify }},
    "description": {{ site.description | strip_newlines | jsonify }},
    "author": {{ site.author.name | jsonify }},
    "nick": {{ site.author.nick | jsonify }},
    "github": {{ site.social.github | jsonify }}
  },
  "posts": [
    {% for post in site.posts %}{
      "title": {{ post.title | jsonify }},
      "url": {{ post.url | relative_url | jsonify }},
      "date": {{ post.date | date: "%Y-%m-%d" | jsonify }},
      "slug": {{ post.slug | jsonify }},
      "tags": {{ post.tags | jsonify }},
      "excerpt": {{ post.excerpt | strip_html | strip_newlines | truncatewords: 60 | jsonify }}
    }{% unless forloop.last %},{% endunless %}
    {% endfor %}
  ]
}
</script>

<noscript>
  <section class="home-fallback">
    <h1 class="prompt">root@{{ site.prompt_user | default: site.title }}:~#</h1>
    <p>{{ site.description }}</p>
    <h2>Son Yazılar</h2>
    <ul class="post-list">
      {% for post in site.posts limit: site.home_posts_limit %}
      <li>
        <a href="{{ post.url | relative_url }}" class="post-title">{{ post.title }}</a>
        <div class="post-meta">
          <time datetime="{{ post.date | date_to_xmlschema }}">{{ post.date | date: "%d %b %Y" }}</time>
        </div>
        <p>{{ post.excerpt | strip_html | strip_newlines | truncatewords: 32 }}</p>
      </li>
      {% endfor %}
    </ul>
    <a href="{{ '/posts/' | relative_url }}" class="more-link">Tüm Yazılar →</a>
  </section>
</noscript>
