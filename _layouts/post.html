---
layout: default
---
<article class="post">
  <h1>{{ page.title }}</h1>
  <div class="post-meta">
    <time datetime="{{ page.date | date_to_xmlschema }}">{{ page.date | date: "%d %B %Y" }}</time>
    {% if page.tags.size > 0 %}
    <span class="tags">
      {% for tag in page.tags %}<a href="{{ '/tags/' | relative_url }}#{{ tag | slugify }}" class="tag">#{{ tag }}</a>{% endfor %}
    </span>
    {% endif %}
  </div>

  <div class="post-content">
    {{ content }}
  </div>

  <a href="{{ '/posts/' | relative_url }}" class="back-link">← Tüm yazılara dön</a>
</article>
